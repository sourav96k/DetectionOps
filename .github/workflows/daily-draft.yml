name: Daily Article Draft Generator

on:

  schedule:

    - cron: "0 6 * * *"

  workflow_dispatch:


permissions:

  contents: write


jobs:

  generate:

    runs-on: ubuntu-latest


    steps:


    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"


    - name: Generate drafts
      run: |
        python scripts/generate_article.py


    - name: Save drafts
      run: |
        git config --global user.name "DetectionOps Bot"
        git config --global user.email "bot@detectionops.com"

        git add drafts/

        git commit -m "Auto generate daily drafts" || echo "No changes"

        git push
