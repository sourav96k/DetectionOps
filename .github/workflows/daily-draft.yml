name: DetectionOps Daily Builder

on:

  schedule:

    - cron: "0 6 * * *"

  workflow_dispatch:


permissions:

  contents: write


jobs:

  build:

    runs-on: ubuntu-latest


    steps:


    - name: Checkout
      uses: actions/checkout@v4


    - name: Python Setup
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"


    - name: Generate drafts
      run: |
        python scripts/generate_article.py


    - name: Publish articles
      run: |
        python scripts/publish_article.py


    - name: Save changes
      run: |

        git config --global user.name "DetectionOps Bot"

        git config --global user.email "bot@detectionops.com"


        git add .


        git commit -m "Auto publish articles" || echo "No changes"


        git push
